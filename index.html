<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Torneo MarCaos GG</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background-image:url('fondo.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    color:white;
    font-family:Inter,sans-serif;
    font-weight: 700;
}

.overlay{
    background:rgba(0,0,0,0.75);
    min-height:100vh;
    padding:20px;
}

h1{
    text-align:center;
    color:#ff9900;
    font-family:'Orbitron', sans-serif;
    font-size:48px;
    letter-spacing:3px;
    text-transform:uppercase;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#ff9900;
padding:12px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #333;
}

.gold{
background:#FFD700;
color:black;
}

.silver{
background:#C0C0C0;
color:black;
}

.bronze{
background:#CD7F32;
}

</style>

</head>

<body>

<div class="overlay">

<h1>🏆 TORNEO MARCAOS GG</h1>

<table>

<thead>

<tr>
<th>#</th>
<th>Equipo</th>
<th>Puntos</th>
</tr>

</thead>

<tbody id="tabla"></tbody>

</table>

<script>

const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSEs-CKTjGiTDH8f5cq0q-RaMAOhs9pWO1OdGPbBSVbSeZWsi-DSS2gzLZTNLqmetMZL1tFdV2-CtEI/pub?gid=0&single=true&output=csv";

fetch(csvURL)

.then(response => response.text())

.then(data => {

const filas = data.trim().split("\n").slice(1);

let equipos = [];

filas.forEach(fila => {

const c = fila.split(",");

if(c[0]){

equipos.push({
equipo:c[0],
puntos:Number(c[7]) || 0
});

}

});

equipos.sort((a,b)=>b.puntos-a.puntos);

const tabla = document.getElementById("tabla");

equipos.forEach((e,i)=>{

let clase="";

if(i===0) clase="gold";
if(i===1) clase="silver";
if(i===2) clase="bronze";

tabla.innerHTML += `
<tr class="${clase}">
<td>${i+1}</td>
<td>${e.equipo}</td>
<td>${e.puntos}</td>
</tr>
`;

});

})

.catch(error => {

document.body.innerHTML += "<p>Error cargando Google Sheets</p>";

console.log(error);

});

</script>
    
</div>
    
</body>

</html>
