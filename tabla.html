<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FF Tournament Scoreboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:linear-gradient(135deg,#0b0b0b,#151515);

color:white;

min-height:100vh;

}

header{

padding:30px;

text-align:center;

background:#111;

border-bottom:3px solid #ffb400;

}

h1{

font-size:45px;

color:#ffb400;

}

h3{

margin-top:10px;

color:#ccc;

}

.container{

width:95%;

max-width:1400px;

margin:auto;

padding:30px;

}

table{

width:100%;

border-collapse:collapse;

overflow:hidden;

border-radius:12px;

}

thead{

background:#ffb400;

color:#000;

font-size:18px;

}

th{

padding:18px;

}

tbody tr{

background:#1d1d1d;

transition:.25s;

}

tbody tr:nth-child(even){

background:#242424;

}

tbody tr:hover{

background:#333;

transform:scale(1.01);

}

td{

padding:16px;

text-align:center;

font-size:17px;

}

.first{

background:#ffd700 !important;

color:#000;

font-weight:bold;

}

.second{

background:#c0c0c0 !important;

color:#000;

}

.third{

background:#cd7f32 !important;

color:#000;

}

button{

padding:12px 25px;

background:#ffb400;

border:none;

font-size:17px;

font-weight:bold;

cursor:pointer;

border-radius:8px;

margin-top:25px;

}

button:hover{

background:#ffc933;

}

</style>

</head>

<body>

<header>

<h1>FREE FIRE TOURNAMENT</h1>

<h3>MATCH 1 / 12</h3>

</header>

<div class="container">

<table id="tabla">

<thead>

<tr>

<th>#</th>

<th>TEAM</th>

<th>KILLS</th>

<th>BOOYAH</th>

<th>POINTS</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

<center>

<button onclick="simular()">Simular Partida</button>

</center>

</div>

<script>

const equipos=[

{name:"TEAM FALCONS",kills:0,booyah:0,puntos:0},

{name:"ALPHA",kills:0,booyah:0,puntos:0},

{name:"DRAGONS",kills:0,booyah:0,puntos:0},

{name:"TITANS",kills:0,booyah:0,puntos:0},

{name:"WARRIORS",kills:0,booyah:0,puntos:0},

{name:"LEGENDS",kills:0,booyah:0,puntos:0},

{name:"NOVA",kills:0,booyah:0,puntos:0},

{name:"RAMPAGE",kills:0,booyah:0,puntos:0}

];

const puntosPosicion=[12,9,8,7,6,5,4,3,2,1];

function actualizar(){

equipos.sort((a,b)=>b.puntos-a.puntos);

const tbody=document.querySelector("tbody");

tbody.innerHTML="";

equipos.forEach((e,i)=>{

let clase="";

if(i==0)clase="first";
if(i==1)clase="second";
if(i==2)clase="third";

tbody.innerHTML+=`

<tr class="${clase}">

<td>${i+1}</td>

<td>${e.name}</td>

<td>${e.kills}</td>

<td>${e.booyah}</td>

<td>${e.puntos}</td>

</tr>

`;

});

}

function simular(){

let copia=[...equipos];

copia.sort(()=>Math.random()-0.5);

copia.forEach((equipo,index)=>{

let kills=Math.floor(Math.random()*12);

equipo.kills+=kills;

equipo.puntos+=kills;

if(index<10){

equipo.puntos+=puntosPosicion[index]||0;

}

if(index==0){

equipo.booyah++;

}

});

actualizar();

}

actualizar();

</script>

</body>
</html>
